include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

// OpenCV 4.12.0 full Android SDK module – required by capacitor-shelf-camera.
// The sdk/ folder lives in the plugin source tree (android/opencv/) which is
// gitignored and not published to npm/pnpm. We reference it with a relative
// path two levels up from this file (capacitor-shelf-camera/android/ → ../.. →
// repo root → android/opencv/).
// Download from https://opencv.org/releases/ if not present.
include ':opencv'
project(':opencv').projectDir = new File('../../android/opencv')

apply from: 'capacitor.settings.gradle'