<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Shelf Camera Demo</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #111;
        color: #eee;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px;
        background: #1a1a2e;
        border-bottom: 1px solid #333;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
        color: #7dd3fc;
      }
      header p { font-size: 12px; color: #888; margin-top: 4px; }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        background: #16213e;
      }
      .controls button {
        flex: 1;
        min-width: 100px;
        padding: 12px 8px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .controls button:active { opacity: 0.7; }
      .controls button:disabled { opacity: 0.35; cursor: not-allowed; }

      #btnStart   { background: #22c55e; color: #000; }
      #btnStop    { background: #ef4444; color: #fff; }
      #btnBegin   { background: #3b82f6; color: #fff; }
      #btnCommit  { background: #a855f7; color: #fff; }
      #btnCancel  { background: #f59e0b; color: #000; }

      .signals {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 12px 16px;
        background: #0f172a;
      }
      .signal {
        background: #1e293b;
        border-radius: 6px;
        padding: 8px;
        text-align: center;
      }
      .signal .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
      .signal .value { font-size: 18px; font-weight: 700; color: #7dd3fc; margin-top: 2px; }

      .log-container {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 8px 16px;
      }
      .log-container h2 {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        line-height: 1.6;
        color: #94a3b8;
        background: #0a0a0a;
        border-radius: 6px;
        padding: 8px;
      }
      #log .event  { color: #22c55e; }
      #log .error  { color: #ef4444; }
      #log .info   { color: #7dd3fc; }
      #log .warn   { color: #f59e0b; }
    </style>
  </head>
  <body>
    <header>
      <h1>📷 Shelf Camera Demo</h1>
      <p>capacitor-shelf-camera test harness</p>
    </header>

    <div class="controls">
      <button id="btnStart" onclick="doStart()">▶ Start</button>
      <button id="btnBegin" onclick="doBeginPano()" disabled>📐 Begin Pano</button>
      <button id="btnCommit" onclick="doCommit()" disabled>✅ Commit</button>
      <button id="btnCancel" onclick="doCancel()" disabled>⛔ Cancel</button>
      <button id="btnStop" onclick="doStop()" disabled>⏹ Stop</button>
    </div>

    <div class="signals">
      <div class="signal"><div class="label">Blur</div><div class="value" id="sigBlur">—</div></div>
      <div class="signal"><div class="label">Motion</div><div class="value" id="sigMotion">—</div></div>
      <div class="signal"><div class="label">Tilt°</div><div class="value" id="sigTilt">—</div></div>
      <div class="signal"><div class="label">Overlap%</div><div class="value" id="sigOverlap">—</div></div>
      <div class="signal"><div class="label">Luma</div><div class="value" id="sigLuma">—</div></div>
      <div class="signal"><div class="label">FPS</div><div class="value" id="sigFps">—</div></div>
    </div>

    <div class="log-container">
      <h2>Event Log</h2>
      <div id="log"></div>
    </div>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
